services:
  api:
    build:
      context: .
    container_name: internal-docs-copilot
    environment:
      APP_NAME: ${APP_NAME:-internal-docs-copilot}
      APP_ENV: ${APP_ENV:-development}
      APP_DEBUG: ${APP_DEBUG:-false}
      SQLITE_URL: ${SQLITE_URL:-sqlite+pysqlite:///./data/internal_docs_copilot.db}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_CHAT_MODEL: ${OPENAI_CHAT_MODEL:-gpt-4.1-mini}
      OPENAI_EMBEDDING_MODEL: ${OPENAI_EMBEDDING_MODEL:-text-embedding-3-small}
      CHROMA_PERSIST_DIR: ${CHROMA_PERSIST_DIR:-./data/chroma}
      UPLOAD_DIR: ${UPLOAD_DIR:-./data/uploads}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      PDF_CHUNK_SIZE: ${PDF_CHUNK_SIZE:-800}
      PDF_CHUNK_OVERLAP: ${PDF_CHUNK_OVERLAP:-120}
      DEFAULT_TOP_K: ${DEFAULT_TOP_K:-5}
      MIN_EVIDENCE_SCORE: ${MIN_EVIDENCE_SCORE:-0.25}
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
    restart: unless-stopped
